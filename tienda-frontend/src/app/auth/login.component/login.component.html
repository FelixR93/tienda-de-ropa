<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>XIXI</h1>
      <p>Bienvenido a tu tienda de ropa</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()">

      <div class="input-group">
        <input id="email" type="email" formControlName="email" placeholder=" " />
        <label for="email">Correo electrónico</label>
        <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error-msg">
          Ingresa un correo válido
        </div>
      </div>

      <div class="input-group">
        <input id="password" type="password" formControlName="password" placeholder=" " />
        <label for="password">Contraseña</label>
        <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="error-msg">
          La contraseña debe tener al menos 6 caracteres
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

      <p class="register-link">
        ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
      </p>
    </form>
  </div>
</div>
